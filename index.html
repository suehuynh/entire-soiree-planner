<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Soirée Planner — Three Night Summer Soirée</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Three-Night Summer Soirée</h1>
      <p class="tag">Warm dusk, string lights & good company</p>
      <div class="countdown-card">
        <h2>Countdown to Golden Hour — Opening Night</h2>
        <div id="countdown" class="countdown">—</div>
        <small id="opening-night-label" class="muted"></small>
      </div>
    </header>

    <section class="grid">
      <section class="card" id="guests-card">
        <h2>Guest List</h2>
        <div class="controls">
          <input id="new-name" placeholder="Add guest name" />
          <input id="new-plusone" placeholder="Plus-one (optional)" />
          <select id="new-rsvp">
            <option value="pending">Pending</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
          <button id="add-guest">Add</button>
        </div>
        <table id="guest-table">
          <thead>
            <tr><th>Name</th><th>RSVP</th><th>Plus-one</th><th></th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section class="card" id="drinks-card">
        <h2>Signature Drinks</h2>
        <ol id="drinks-list"></ol>
      </section>
    </section>

    <footer class="muted note">Open the page in any browser. Data is saved in your browser (localStorage).</footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
